<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account – ShopKart</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="../index.html" class="navbar-brand">ShopKart</a>
        <div class="navbar-links" id="auth-links"></div>
    </nav>

    <div class="container container--narrow">
        <div class="page-header">
            <h1>My Account</h1>
        </div>
        <div class="card">
            <div class="info-row">
                <span class="info-label">Name</span>
                <span class="info-value" id="user-name">–</span>
            </div>
            <div class="info-row">
                <span class="info-label">Email</span>
                <span class="info-value" id="user-email">–</span>
            </div>
            <div style="margin-top: 24px; text-align: right;">
                <button class="btn btn-secondary" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        if (!requireAuth()) { /* redirects */ }
        const user = getUser();
        if (user) {
            document.getElementById("user-name").textContent = user.name;
            document.getElementById("user-email").textContent = user.email;
        }
    </script>
</body>
</html>
