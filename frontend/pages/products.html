<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products – ShopKart</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="../index.html" class="navbar-brand">ShopKart</a>
        <div class="navbar-links" id="auth-links"></div>
    </nav>

    <div class="products-container">
        <aside class="products-sidebar">
            <div class="sidebar-header">
                <h3>Products</h3>
                <button class="btn-clear-all" onclick="clearAllFilters()">Clear All</button>
            </div>

            <div class="sort-section">
                <div class="sort-controls">
                    <select id="f-sort_by" class="filter-select" onchange="loadProducts(0)"></select>
                    <button class="btn-sort-toggle" id="sort-order-btn" onclick="toggleSortOrder()" title="Toggle sort order">
                        <span id="sort-order-icon">↑</span>
                    </button>
                </div>
            </div>

            <div class="filters-divider"></div>

            <div class="filter-section">
                <div class="filter-section-header" onclick="toggleFilterSection('fashion_style')">
                    <span class="filter-collapse-icon" id="collapse-icon-fashion_style">›</span>
                    <h4 class="filter-section-title">Style</h4>
                </div>
                <div id="filter-fashion_style" class="filter-checkboxes"></div>
            </div>

            <div class="filter-section">
                <div class="filter-section-header" onclick="toggleFilterSection('brand')">
                    <span class="filter-collapse-icon" id="collapse-icon-brand">›</span>
                    <h4 class="filter-section-title">Brand</h4>
                </div>
                <div id="filter-brand" class="filter-checkboxes"></div>
            </div>

            <div class="filter-section">
                <div class="filter-section-header" onclick="toggleFilterSection('category')">
                    <span class="filter-collapse-icon" id="collapse-icon-category">›</span>
                    <h4 class="filter-section-title">Category</h4>
                </div>
                <div id="filter-category" class="filter-checkboxes"></div>
            </div>

            <div class="filter-section">
                <div class="filter-section-header" onclick="toggleFilterSection('occasion')">
                    <span class="filter-collapse-icon" id="collapse-icon-occasion">›</span>
                    <h4 class="filter-section-title">Occasion</h4>
                </div>
                <div id="filter-occasion" class="filter-checkboxes"></div>
            </div>
        </aside>

        <main class="products-main">
            <div id="product-list" class="product-grid"></div>
            <div id="msg" class="empty-state" style="display:none;"></div>

            <div id="bottom-controls" class="bottom-controls" style="display:none;">
                <div class="per-page-control">
                    <label>Per Page</label>
                    <select id="f-page_size" onchange="loadProducts(0)">
                        <option value="20">20</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                </div>
                <div id="pagination" class="pagination"></div>
            </div>
        </main>
    </div>

    <script src="../js/app.js"></script>
    <script>
        if (!requireAuth()) { /* redirects */ }

        let sortOrder = "asc";

        function toggleSortOrder() {
            sortOrder = sortOrder === "asc" ? "desc" : "asc";
            document.getElementById("sort-order-icon").textContent = sortOrder === "asc" ? "↑" : "↓";
            loadProducts(0);
        }

        function populateFilterCheckboxes(containerId, items, filterKey) {
            const container = document.getElementById(containerId);
            container.innerHTML = "";
            items.forEach(item => {
                const label = document.createElement("label");
                label.className = "filter-checkbox";
                const checkbox = document.createElement("input");
                checkbox.type = "checkbox";
                checkbox.value = item.name;
                checkbox.dataset.filterKey = filterKey;
                checkbox.addEventListener("change", () => loadProducts(0));
                const span = document.createElement("span");
                span.textContent = item.display_name;
                label.appendChild(checkbox);
                label.appendChild(span);
                container.appendChild(label);
            });
        }

        async function loadMeta() {
            try {
                const meta = await apiCall("/meta");
                populateFilterCheckboxes("filter-brand", meta.brands, "brand");
                populateFilterCheckboxes("filter-category", meta.categories, "category");
                populateFilterCheckboxes("filter-fashion_style", meta.fashion_styles, "fashion_style");
                populateFilterCheckboxes("filter-occasion", meta.occasions, "occasion");

                const sortSelect = document.getElementById("f-sort_by");
                meta.sortable_fields.forEach(item => {
                    const opt = document.createElement("option");
                    opt.value = item.name;
                    opt.textContent = item.display_name;
                    sortSelect.appendChild(opt);
                });
            } catch (err) {
                console.error("Failed to load meta:", err);
            }
        }

        function clearAllFilters() {
            document.querySelectorAll(".filter-checkboxes input[type=checkbox]").forEach(cb => cb.checked = false);
            document.getElementById("f-sort_by").selectedIndex = 0;
            document.getElementById("f-page_size").value = "20";
            sortOrder = "asc";
            document.getElementById("sort-order-icon").textContent = "↑";
            loadProducts(0);
        }

        function toggleFilterSection(filterKey) {
            const checkboxContainer = document.getElementById(`filter-${filterKey}`);
            const icon = document.getElementById(`collapse-icon-${filterKey}`);
            
            if (checkboxContainer.style.display === "none") {
                checkboxContainer.style.display = "block";
                icon.style.transform = "rotate(90deg)";
            } else {
                checkboxContainer.style.display = "none";
                icon.style.transform = "rotate(0deg)";
            }
        }

        function selectAllFilters(filterKey) {
            const checkboxes = document.querySelectorAll(`#filter-${filterKey} input[type=checkbox]`);
            checkboxes.forEach(cb => cb.checked = true);
            loadProducts(0);
        }

        function clearFilterSection(filterKey) {
            const checkboxes = document.querySelectorAll(`#filter-${filterKey} input[type=checkbox]`);
            checkboxes.forEach(cb => cb.checked = false);
            loadProducts(0);
        }

        function buildParams(page) {
            const params = new URLSearchParams();
            
            const checkedBoxes = document.querySelectorAll(".filter-checkboxes input[type=checkbox]:checked");
            const filterGroups = {};
            
            checkedBoxes.forEach(cb => {
                const key = cb.dataset.filterKey;
                if (!filterGroups[key]) filterGroups[key] = [];
                filterGroups[key].push(cb.value);
            });

            // Format as fieldname.value1,value2
            Object.keys(filterGroups).forEach(key => {
                if (filterGroups[key].length > 0) {
                    params.set(`${key}.${filterGroups[key].join(",")}`, "");
                }
            });

            const sortBy = document.getElementById("f-sort_by").value;
            if (sortBy) {
                params.set("sort_by", sortBy);
                params.set("sort_order", sortOrder);
            }

            params.set("page", page);
            params.set("page_size", document.getElementById("f-page_size").value);
            return params;
        }

        function renderStars(rating, ratingCount) {
            if (rating == null || parseFloat(rating) === 0) return "";
            const val = parseFloat(rating);
            let html = '<span class="stars">';
            for (let i = 1; i <= 5; i++) {
                if (val >= i) html += '<span class="star star--full">★</span>';
                else if (val >= i - 0.5) html += '<span class="star star--half">★</span>';
                else html += '<span class="star star--empty">★</span>';
            }
            html += `<span class="star-value">${val}</span>`;
            if (ratingCount > 0) html += `<span class="star-count">(${ratingCount})</span>`;
            html += '</span>';
            return html;
        }

        function renderProduct(p) {
            const imageUrl = p.image ? API + p.image : null;
            const imageHtml = imageUrl
                ? `<img src="${imageUrl}" alt="${p.name}">`
                : `<span class="placeholder">No image</span>`;

            const tagline = p.tagline ? `<div class="product-card__tagline">${p.tagline}</div>` : '';

            return `
                <div class="product-card" onclick="viewProduct(${p.product_id})" style="cursor: pointer;">
                    <div class="product-card__image">${imageHtml}</div>
                    <div class="product-card__body">
                        <div class="product-card__name">${p.name}</div>
                        ${tagline}
                        <div class="product-card__pricing">
                            <span class="product-card__price">${p.selling_price_formatted}</span>
                            ${p.original_price_formatted ? `<span class="product-card__original">${p.original_price_formatted}</span>` : ""}
                            ${p.discount_percentage_formatted ? `<span class="product-card__discount">${p.discount_percentage_formatted}</span>` : ""}
                        </div>
                        <div class="product-card__footer">
                            <span class="badge">${p.brand_formatted}</span>
                            ${renderStars(p.rating, p.rating_count)}
                        </div>
                    </div>
                </div>`;
        }

        function viewProduct(productId) {
            window.location.href = `product-details.html?id=${productId}`;
        }

        function renderPagination(data) {
            const pag = document.getElementById("pagination");
            if (data.total_pages <= 1) { pag.innerHTML = ""; return; }

            const current = data.page;
            const total = data.total_pages;
            let html = `<button class="btn btn-secondary btn-sm" ${current === 0 ? "disabled" : ""} onclick="loadProducts(${current - 1})">← Prev</button>`;

            const range = pageRange(current, total);
            range.forEach(p => {
                if (p === "...") {
                    html += `<span class="pagination__ellipsis">…</span>`;
                } else {
                    html += `<button class="btn btn-sm ${p === current ? "btn-primary" : "btn-secondary"}" onclick="loadProducts(${p})">${p + 1}</button>`;
                }
            });

            html += `<span class="pagination__info">${data.total_items} items</span>`;
            html += `<button class="btn btn-secondary btn-sm" ${current >= total - 1 ? "disabled" : ""} onclick="loadProducts(${current + 1})">Next →</button>`;
            pag.innerHTML = html;
        }

        function pageRange(current, total) {
            if (total <= 7) return Array.from({ length: total }, (_, i) => i);
            const pages = [];
            pages.push(0);
            if (current > 2) pages.push("...");
            for (let i = Math.max(1, current - 1); i <= Math.min(total - 2, current + 1); i++) {
                pages.push(i);
            }
            if (current < total - 3) pages.push("...");
            pages.push(total - 1);
            return pages;
        }

        async function loadProducts(page = 0) {
            const list = document.getElementById("product-list");
            const msg = document.getElementById("msg");
            const bottom = document.getElementById("bottom-controls");
            list.innerHTML = "";
            msg.style.display = "none";
            bottom.style.display = "none";

            try {
                const data = await apiCall("/products?" + buildParams(page).toString());
                if (!data.items || data.items.length === 0) {
                    msg.style.display = "block";
                    msg.innerHTML = "<p>No products found.</p>";
                    return;
                }
                list.innerHTML = data.items.map(renderProduct).join("");
                bottom.style.display = "flex";
                renderPagination(data);
            } catch (err) {
                msg.style.display = "block";
                msg.innerHTML = `<p>${err.message}</p>`;
            }
        }

        loadMeta().then(() => loadProducts());
    </script>
</body>
</html>
