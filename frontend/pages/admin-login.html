<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – ShopKart</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="../index.html" class="navbar-brand">ShopKart <small>Admin</small></a>
        <div class="navbar-links" id="auth-links"></div>
    </nav>

    <div class="container container--narrow">
        <div class="page-header">
            <h1>Admin Login</h1>
        </div>
        <div class="card">
            <form id="admin-login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="admin@shopkart.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Login</button>
                <div id="msg" class="msg"></div>
            </form>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        (function() {
            const user = getUser();
            if (user && (user.role === "admin" || user.role === "owner")) {
                window.location.href = "admin.html";
            }
        })();

        document.getElementById("admin-login-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            clearMsg("msg");
            try {
                const data = await apiCall("/auth/login", {
                    method: "POST",
                    body: JSON.stringify({
                        email: document.getElementById("email").value,
                        password: document.getElementById("password").value
                    })
                });
                if (data.role !== "admin" && data.role !== "owner") {
                    showMsg("msg", "Access denied. Admin or Owner role required.", "error");
                    return;
                }
                saveAuth(data);
                window.location.href = "admin.html";
            } catch (err) {
                showMsg("msg", err.message, "error");
            }
        });
    </script>
</body>
</html>
